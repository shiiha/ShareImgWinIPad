<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShareImgWinIPad</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 16px; background: #f6f7f9; }
    .card { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.08); max-width: 720px; margin: 0 auto; }
    button { font-size: 16px; padding: 12px 16px; border-radius: 10px; border: none; background: #007aff; color: white; }
    button:disabled { background: #8ebeff; }
    img { width: 100%; border-radius: 10px; margin-top: 12px; background: #eee; }
    .meta { color: #444; font-size: 14px; margin-bottom: 10px; }
    .hint { color: #666; font-size: 13px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="card">
  <h1>ShareImgWinIPad</h1>
  <p class="meta">PCから送った最新画像を iPad で受け取り、コピーできます。</p>
  {% if has_image %}
    <p class="meta">最終更新: {{ updated_at }}</p>
    <div class="row">
      <button id="copyBtn">画像をコピー</button>
      <button id="reloadBtn" type="button">最新に更新</button>
    </div>
    <p class="hint">※ Safari では https 接続でないとコピーできないことがあります。</p>
    <img id="latest" src="/latest-image?ts={{ updated_at }}" alt="latest image" />
  {% else %}
    <p>まだ画像がありません。PC側から右クリック送信してください。</p>
  {% endif %}
</div>
<script>
const copyBtn = document.getElementById('copyBtn');
const reloadBtn = document.getElementById('reloadBtn');
const latestImg = document.getElementById('latest');

async function copyImage() {
  if (!latestImg) return;
  try {
    const res = await fetch('/latest-image?ts=' + Date.now());
    if (!res.ok) throw new Error('画像の取得に失敗しました');
    const blob = await res.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    alert('コピーしました。貼り付け先アプリでペーストしてください。');
  } catch (err) {
    alert('コピーに失敗しました: ' + err.message + '\nSafariの場合はHTTPS化が必要です。');
  }
}

if (copyBtn) {
  copyBtn.addEventListener('click', copyImage);
}
if (reloadBtn) {
  reloadBtn.addEventListener('click', () => {
    window.location.reload();
  });
}
</script>
</body>
</html>
